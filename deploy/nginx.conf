# LLM API Gateway — Nginx Configuration
# Place this in /etc/nginx/sites-available/llm-gateway
# Then: ln -s /etc/nginx/sites-available/llm-gateway /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name llm-gateway.example.com;  # ← CHANGE THIS

    ssl_certificate     /etc/letsencrypt/live/llm-gateway.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm-gateway.example.com/privkey.pem;

    # Admin panel
    location /admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LLM API (SSE streaming support)
    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;           # Critical for SSE streaming
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long LLM responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name llm-gateway.example.com;  # ← CHANGE THIS
    return 301 https://$server_name$request_uri;
}
