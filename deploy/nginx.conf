# LLM API Gateway — Nginx Configuration (desensitized)
#
# Deploy: place this in /etc/nginx/sites-available/llm-gateway
# Then: ln -s /etc/nginx/sites-available/llm-gateway /etc/nginx/sites-enabled/
# And reload: nginx -t && systemctl reload nginx

# ---------------------------------------------------------------------------
# IMPORTANT: The two rate-limit zones below must be defined ONCE in the
# global http { } block of /etc/nginx/nginx.conf (NOT here):
#
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name ai.shimiaocheng.top;

    ssl_certificate     /etc/letsencrypt/live/ai.shimiaocheng.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.shimiaocheng.top/privkey.pem;

    # Hard cap on request body size (1MB) to mitigate large-payload abuse.
    client_max_body_size 1m;

    # ---- Hidden admin path (obfuscated) → internal /admin/ ----
    location /m-7xa2/ {
        # Admin login/management rate limit
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- LLM API (SSE streaming support) ----
    location /v1/ {
        # API rate limit
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;           # Critical for SSE streaming
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long LLM responses
        # proxy_read_timeout MUST match Go streaming overall timeout (10 min, stream.go:30 / ADR-0004). Keep both in sync when changing one.
        proxy_read_timeout 600s;
        proxy_send_timeout 300s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- User self-service console (static) ----
    location /user/ {
        proxy_pass http://127.0.0.1:8080/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- Root redirect to user console ----
    location = / {
        return 301 https://$host/user/;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ai.shimiaocheng.top;
    return 301 https://$server_name$request_uri;
}
