# LLM API Gateway — Nginx Configuration (desensitized)
#
# Deploy: place this in /etc/nginx/sites-available/llm-gateway
# Then: ln -s /etc/nginx/sites-available/llm-gateway /etc/nginx/sites-enabled/
# And reload: nginx -t && systemctl reload nginx

# ---------------------------------------------------------------------------
# IMPORTANT: The login rate-limit zone must be defined ONCE in the
# global http { } block of /etc/nginx/nginx.conf (NOT here):
#
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
#
# NOTE: api_limit (per-/v1/ rate limiting) was intentionally REMOVED. The
# gateway is a pure passthrough (上游自带限速), so /v1/ has NO nginx rate
# limit. Do NOT re-add `limit_req zone=api_limit` to the /v1/ block below.
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name ai.shimiaocheng.top;

    ssl_certificate     /etc/letsencrypt/live/ai.shimiaocheng.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.shimiaocheng.top/privkey.pem;

    # Default request body cap (1MB) to mitigate large-payload abuse on admin/UI paths.
    # The /v1/ API location overrides this with a larger cap (see below).
    client_max_body_size 1m;

    # ---- Hidden admin path (obfuscated) → internal /admin/ ----
    location /m-7xa2/ {
        # Admin login/management rate limit
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        error_page 429 @ratelimit_json;

        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- LLM API (SSE streaming support) ----
    location /v1/ {
        # Global ceiling for the API path. A single request may be up to 32MB here
        # so it can reach Go; the per-user body cap (default 1MB, admin-adjustable up
        # to 32MB) is then enforced by Go after auth. Admin/UI paths keep the 1MB server default.
        # No nginx rate limit here (pure passthrough — 上游自带限速).
        client_max_body_size 32m;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_intercept_errors off;    # Locked invariant: pass upstream (Go) status codes (e.g. 429/503) through untouched.
        proxy_buffering off;           # Critical for SSE streaming
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long LLM responses
        # proxy_read_timeout MUST match Go streaming overall timeout (10 min, stream.go:30 / ADR-0004). Keep both in sync when changing one.
        proxy_read_timeout 600s;
        proxy_send_timeout 300s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- User self-service console (static) ----
    location /user/ {
        proxy_pass http://127.0.0.1:8080/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
    }

    # ---- Root redirect to user console ----
    location = / {
        return 301 https://$host/user/;
    }

    # Unified JSON body for nginx rate-limit rejections (429).
    # Note: proxy_intercept_errors defaults to off, so upstream (Go) 429 responses
    # (quota exceeded) are passed through untouched — only locally generated
    # limit_req 429s hit this location.
    location @ratelimit_json {
        default_type application/json;
        return 429 '{"error":"rate_limited","message":"Too many requests, please slow down and retry later."}';
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ai.shimiaocheng.top;
    return 301 https://$server_name$request_uri;
}
