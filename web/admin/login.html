<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Gateway — 管理面板登录</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>LLM API Gateway</h1>
            <p class="login-subtitle">管理面板</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Admin 用户名">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="密码">
                </div>
                <div id="login-error" class="error-message hidden"></div>
                <button type="submit" class="btn btn-primary btn-block">登 录</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            errorEl.classList.add('hidden');

            try {
                const resp = await fetch('login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await resp.json();

                if (resp.ok) {
                    window.location.href = './';
                } else {
                    errorEl.textContent = data.error || '登录失败';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
