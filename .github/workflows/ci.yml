name: CI

# Run on every push to any branch and on pull requests targeting main.
# This turns the manual `make ci` gate into an unattended check.
on:
  push:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI gate (make ci)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      # The Makefile `ci` target runs: fmt -> vet -> test -> build-linux.
      # CGO_ENABLED=0 is already set inside the Makefile's build-linux target,
      # and modernc.org/sqlite is a pure-Go driver, so no system C libraries
      # or apt packages are required.
      - name: Run CI gate
        run: make ci
